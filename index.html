<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0">
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png">
    <title>Frontend Mentor | Time tracking dashboard</title>
    <link
      rel="stylesheet"
      href="./styles/index.css">
    <script src="./scripts/index.js" defer></script>
  </head>
  <body>
    <main class="content">
      <h1 class="visually-hidden">Time Tracking</h1>
      <section class="dashboard">
        <h2 class="visually-hidden">Time Tracking Dashboard</h2>
        <div class="dashboard__wrapper">
          <div class="dashboard__person">
            <div class="info-card">
              <div class="info-card_image-wrapper">
                <img
                  class="info-card__image"
                  src="./images/image-jeremy.png"
                  alt="Photo Jeremy Robson">
              </div>
              <div class="info-card__body">
                <p class="info-card__subtitle">Report for</p>
                <h3 class="info-card__title">Jeremy Robson</h3>
              </div>
            </div>
            <ul class="view-selectors" role="tablist">
              <li class="view-selectors__item">
                <button
                  class="view-selectors__button is-active"
                  type="button"
                  role="tab"
                  aria-selected="true">
                  Daily
                </button>
              </li>
              <li class="view-selectors__item">
                <button
                  class="view-selectors__button"
                  type="button"
                  role="tab"
                  aria-selected="false">
                  Weekly
                </button>
              </li>
              <li class="view-selectors__item">
                <button
                  class="view-selectors__button"
                  type="button"
                  role="tab"
                  aria-selected="false">
                  Monthly
                </button>
              </li>
            </ul>
          </div>
          <div class="dashboard__item dashboard__item--work">
            <article class="tracking-card">
              <header class="tracking-card__header">
                <h4 class="tracking-card__title">Work</h4>
                <button
                  class="tracking-card__button"
                  type="button"
                  aria-label="Menu">
                  <img
                    class="tracking-card__menu"
                    src="./images/icon-ellipsis.svg"
                    alt="Menu">
                  <span class="visually-hidden">Menu</span>
                </button>
              </header>
              <div class="tracking-card__body">
                <p class="tracking-card__time">
                  <span>5</span>hrs
                </p>
                <p class="tracking-card__prev-period">
                  Last Week -
                  <span>7</span>hrs
                </p>
              </div>
            </article>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
