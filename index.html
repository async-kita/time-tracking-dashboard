<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0">
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png">
    <title>Frontend Mentor | Time tracking dashboard</title>
    <link
      rel="stylesheet"
      href="./styles/index.css">
    <script src="./scripts/index.js" defer></script>
  </head>
  <body>
    <main class="content">
      <h1 class="visually-hidden">Time Tracking</h1>
      <section class="dashboard" data-js-dashboard>
        <h2 class="visually-hidden">Time Tracking Dashboard</h2>
        <div class="dashboard__wrapper" data-js-dashboard-wrapper>
          <div class="dashboard__person">
            <div class="info-card">
              <div class="info-card_image-wrapper">
                <img
                  class="info-card__image"
                  src="./images/image-jeremy.png"
                  alt="Photo Jeremy Robson">
              </div>
              <div class="info-card__body">
                <p class="info-card__subtitle">Report for</p>
                <h3 class="info-card__title">Jeremy Robson</h3>
              </div>
            </div>
            <ul class="view-selectors" role="tablist" data-js-dashboard-tabs>
              <li class="view-selectors__item">
                <button
                  class="view-selectors__button is-active"
                  type="button"
                  role="tab"
                  aria-selected="true"
                  data-js-dashboard-tab>
                  Daily
                </button>
              </li>
              <li class="view-selectors__item">
                <button
                  class="view-selectors__button"
                  type="button"
                  role="tab"
                  aria-selected="false"
                  data-js-dashboard-tab>
                  Weekly
                </button>
              </li>
              <li class="view-selectors__item">
                <button
                  class="view-selectors__button"
                  type="button"
                  role="tab"
                  aria-selected="false"
                  data-js-dashboard-tab>
                  Monthly
                </button>
              </li>
            </ul>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
